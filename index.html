<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Visualización web académica de una investigación sobre la robustez de Deepware Scanner, Hive Moderation y Resemble AI frente a perturbaciones. No realiza detección en tiempo real."
    />
    <title>DeepfakeRank — Robustez de detectores de deepfakes</title>
    <script>
      // Aplica el tema guardado antes de pintar para evitar parpadeo (FOUC).
      // Por defecto: modo oscuro.
      (function () {
        try {
          var t = localStorage.getItem('dfr-theme')
          if (t !== 'light' && t !== 'dark') t = 'dark'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
